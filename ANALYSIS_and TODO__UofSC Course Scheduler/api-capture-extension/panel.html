<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; gap: 8px; padding: 8px;
    background: #2d2d2d; border-bottom: 1px solid #444;
    align-items: center;
  }
  .toolbar button {
    padding: 4px 12px; border: 1px solid #555; background: #3c3c3c;
    color: #d4d4d4; cursor: pointer; font-family: monospace; font-size: 12px;
  }
  .toolbar button:hover { background: #505050; }
  .toolbar button.recording { background: #73000A; color: #fff; border-color: #73000A; }
  .toolbar .count { color: #888; margin-left: auto; }

  .filters {
    display: flex; gap: 6px; padding: 6px 8px;
    background: #252525; border-bottom: 1px solid #333;
  }
  .filters label { color: #888; cursor: pointer; }
  .filters label:hover { color: #d4d4d4; }
  .filters input[type="text"] {
    flex: 1; padding: 2px 6px; background: #1e1e1e; border: 1px solid #444;
    color: #d4d4d4; font-family: monospace; font-size: 12px;
  }

  .request-list { overflow-y: auto; }

  .request-row {
    display: flex; padding: 4px 8px; border-bottom: 1px solid #2a2a2a;
    cursor: pointer; align-items: center; gap: 8px;
  }
  .request-row:hover { background: #2a2a2a; }
  .request-row.selected { background: #264f78; }
  .request-row.has-json { border-left: 3px solid #65780B; }

  .method { font-weight: bold; min-width: 40px; }
  .method.GET { color: #65780B; }
  .method.POST { color: #466A9F; }
  .method.PUT { color: #A49137; }
  .method.DELETE { color: #CC2E40; }

  .status { min-width: 30px; text-align: center; }
  .status.s2xx { color: #65780B; }
  .status.s3xx { color: #A49137; }
  .status.s4xx { color: #CC2E40; }
  .status.s5xx { color: #CC2E40; }

  .url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #9cdcfe; }
  .content-type { color: #666; min-width: 80px; text-align: right; }
  .size { color: #666; min-width: 60px; text-align: right; }

  .detail-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 55%;
    background: #1e1e1e; border-left: 2px solid #444;
    display: none; flex-direction: column; z-index: 20;
  }
  .detail-panel.open { display: flex; }

  .detail-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px; background: #2d2d2d; border-bottom: 1px solid #444;
  }
  .detail-header button { background: none; border: none; color: #d4d4d4; cursor: pointer; font-size: 16px; }

  .detail-tabs {
    display: flex; gap: 0; background: #252525; border-bottom: 1px solid #444;
  }
  .detail-tabs button {
    padding: 6px 16px; border: none; background: none;
    color: #888; cursor: pointer; font-family: monospace; font-size: 12px;
    border-bottom: 2px solid transparent;
  }
  .detail-tabs button.active { color: #d4d4d4; border-bottom-color: #73000A; }

  .detail-body {
    flex: 1; overflow-y: auto; padding: 8px;
    white-space: pre-wrap; word-break: break-all;
  }

  .json-key { color: #9cdcfe; }
  .json-string { color: #ce9178; }
  .json-number { color: #b5cea8; }
  .json-bool { color: #569cd6; }
  .json-null { color: #569cd6; }

  .header-table { width: 100%; }
  .header-table td { padding: 2px 8px; vertical-align: top; }
  .header-table td:first-child { color: #9cdcfe; white-space: nowrap; min-width: 200px; }
</style>
</head>
<body>

<div class="toolbar">
  <button id="recordBtn" class="recording">Recording</button>
  <button id="clearBtn">Clear</button>
  <button id="exportBtn">Export JSON</button>
  <button id="exportEndpointsBtn">Export API Map</button>
  <span class="count" id="countLabel">0 requests</span>
</div>

<div class="filters">
  <input type="text" id="filterInput" placeholder="Filter URLs... (e.g. api, audit, degree, student, registration)">
  <label><input type="checkbox" id="hideStatic" checked> Hide static</label>
  <label><input type="checkbox" id="jsonOnly"> JSON only</label>
</div>

<div class="request-list" id="requestList"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <span id="detailTitle"></span>
    <button id="closeDetail">&times;</button>
  </div>
  <div class="detail-tabs">
    <button class="active" data-tab="response">Response</button>
    <button data-tab="headers">Headers</button>
    <button data-tab="request">Request Body</button>
    <button data-tab="curl">cURL</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script src="panel.js"></script>
</body>
</html>
